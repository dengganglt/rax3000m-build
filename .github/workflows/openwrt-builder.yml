name: OpenWrt Builder

on:
  repository_dispatch:
    types: [Source Code Update]
  workflow_dispatch:

env:
  # 解决 2026 年 Node 24 兼容性警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-25.12
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        temp-reserve-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        # 调试：列出文件位置，防止路径丢失
        echo "当前工作目录: $PWD"
        ls -F

    - name: Clone Source Code
      working-directory: /workdir
      run: |
        git clone --depth 1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load Custom Feeds
      run: |
        # 修正：直接用 bash 调用，避开权限和路径映射问题
        [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ] && bash "$GITHUB_WORKSPACE/$DIY_P1_SH"
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load Custom Configuration
      run: |
        [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" openwrt/.config
        # 修正：使用绝对路径确保能找到脚本
        [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ] && bash "$GITHUB_WORKSPACE/$DIY_P2_SH"

    - name: Compile the Firmware
      id: compile
      run: |
        cd openwrt
        make defconfig
        echo "::group::Download packages"
        make download -j8
        echo "::endgroup::"
        make -j$(nproc) || make -j1 V=s || { echo "编译失败，请检查插件冲突"; exit 1; }
        echo "status=success" >> $GITHUB_OUTPUT
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize Files
      id: organize
      if: steps.compile.outputs.status == 'success' && !cancelled()
      run: |
        # 精准锁定 RAX3000M 固件生成目录，不要用通配符
        cd openwrt/bin/targets/mediatek/filogic/
        rm -rf packages .config* *.json *.buildinfo *.manifest *.sha256sums
        # 将路径记录在输出变量中
        echo "FIRMWARE_FINAL_PATH=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware to Release
      uses: softprops/action-gh-release@v2
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        tag_name: RAX3000M-1GB-${{ env.FILE_DATE }}
        body_path: release.txt
        # [核心修正] 绝对禁止使用 /*，只上传固件目录内容
        files: ${{ env.FIRMWARE_FINAL_PATH }}/*
        token: ${{ secrets.GITHUB_TOKEN }}
        make_latest: true
